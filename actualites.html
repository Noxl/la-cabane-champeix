<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Actualités — La Cabane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.4.0/default/snipcart.css">
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="styles/consts.css">
  <link rel="stylesheet" href="styles/topbar.css">
  <link rel="stylesheet" href="styles/navbar.css">
  <link rel="stylesheet" href="styles/footer.css">
  <link rel="stylesheet" href="styles/responsive.css">
  <link rel="stylesheet" href="styles/snipcart-theme.css">
  <link rel="stylesheet" href="styles/pages/actualites.css">
</head>
<body>

  <div id="snipcart" data-api-key="N2I3ZTkwZDktMjliMy00YjJiLThjYzItYmY2MzNhMmRmOGRmNjM5MTEwODQ5MDM4MjI0MzM3" hidden></div>

  <div id="header-container"></div>

  <!-- Page header -->
  <div class="actu-page-header">
    <p class="eyebrow">La Cabane · Champeix</p>
    <h1>Actualités & Agenda</h1>
    <p>Nouveautés, ateliers et événements du salon</p>
    <div class="actu-divider"></div>
  </div>

  <!-- ── News section ─────────────────────────── -->
  <section class="news-section">
    <p class="news-section-title">Dernières nouvelles</p>
    <!-- Cards injected by actualites.js -->
    <div class="news-grid"></div>
  </section>

  <!-- ── Agenda section ───────────────────────── -->
  <section class="agenda-section">
    <p class="news-section-title">Agenda</p>
    <div class="agenda-layout">

      <!-- Calendar widget -->
      <div class="calendar-widget">
        <div class="cal-header">
          <button class="cal-nav cal-prev" aria-label="Mois précédent">
            <iconify-icon icon="ph:caret-left" width="14" height="14"></iconify-icon>
          </button>
          <span class="cal-month-label"></span>
          <button class="cal-nav cal-next" aria-label="Mois suivant">
            <iconify-icon icon="ph:caret-right" width="14" height="14"></iconify-icon>
          </button>
        </div>
        <div class="cal-dow">
          <span>L</span><span>M</span><span>M</span>
          <span>J</span><span>V</span><span>S</span><span>D</span>
        </div>
        <div class="cal-grid"></div>
        <div class="cal-events-preview"></div>
      </div>

      <!-- Event cards -->
      <div class="agenda-events"></div>

    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.snipcart.com/themes/v3.4.0/default/snipcart.js" async></script>
  <script src="html_compon/header.js"></script>
  <script src="html_compon/footer.js"></script>
  <script src="scripts/snipcart_interactions.js"></script>
  <script src="scripts/actualites.js"></script>

</body>
</html>
